<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EliteDorm | Interactive Maps</title>
    <link rel="icon" type="image/png" href="/kku_dorm_elite_logo_1777569958199.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Public+Sans:wght@800;900&family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background: var(--neutral-50); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .maps-main-container { flex: 1; padding: 2rem; position: relative; display: flex; flex-direction: column; }
        .map-wrapper-premium { flex: 1; width: 100%; border-radius: 3rem; overflow: hidden; background: white; border: 8px solid white; box-shadow: var(--shadow-2xl); position: relative; }
        #fullMap { width: 100%; height: 100%; z-index: 1; }
        
        .map-filter-overlay {
            position: absolute; top: 1.5rem; right: 1.5rem; z-index: 1000;
            display: flex; flex-direction: column; gap: 0.75rem; align-items: flex-end;
            pointer-events: none; max-width: 450px;
        }
        .map-filter-row { display: flex; gap: 0.75rem; align-items: center; pointer-events: auto; }
        .map-filter-card {
            background: white; padding: 0.75rem 1.25rem; border-radius: var(--radius-pill);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid var(--neutral-100);
            display: flex; align-items: center; gap: 0.75rem;
        }
        .map-filter-card:focus-within { border-color: var(--brand-500); }
        .map-filter-card input {
            background: transparent; border: none; outline: none;
            font-size: 14px; font-weight: 800; color: var(--neutral-900);
        }
        .map-filter-card input::placeholder { color: var(--neutral-300); }
        .map-price-input { width: 90px; text-align: center; }

        .map-zone-bar {
            background: white; padding: 0.4rem; border-radius: var(--radius-pill);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid var(--neutral-100);
            display: flex; gap: 0.4rem; pointer-events: auto;
        }
        .zone-btn {
            padding: 0.5rem 1.25rem; border-radius: var(--radius-pill);
            font-size: 12px; font-weight: 900; color: var(--neutral-500);
            transition: all 0.3s; border: none; background: transparent; cursor: pointer;
        }
        .zone-btn:hover { background: var(--neutral-50); color: var(--neutral-900); }
        .zone-btn.active { background: var(--brand-500); color: white; }

        .map-fav-btn {
            background: white; width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); cursor: pointer; transition: all 0.3s;
            pointer-events: auto; border: 2px solid var(--neutral-100); font-size: 1.2rem; color: var(--neutral-300);
        }
        .map-fav-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        .elite-map-popup .leaflet-popup-content-wrapper { border-radius: 1.5rem; padding: 0; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .elite-map-popup .leaflet-popup-content { margin: 0; width: 260px !important; }
        .popup-card { padding: 0; font-family: 'Sarabun', sans-serif; position: relative; }
        .popup-img { width: 100%; height: 140px; object-fit: cover; }
        .popup-info { padding: 1.25rem; }
        .popup-title { font-weight: 900; font-size: 1.1rem; color: var(--neutral-900); margin-bottom: 0.5rem; }
        .popup-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
        .popup-price { font-weight: 900; color: var(--brand-500); font-size: 1.25rem; }
        .popup-dist { font-size: 11px; font-weight: 800; color: var(--neutral-400); }
        .popup-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1.25rem; }
        .popup-btn { padding: 0.75rem; border-radius: 0.75rem; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
        .popup-btn-primary { background: var(--neutral-900); color: white; }
        .popup-btn-ghost { background: var(--neutral-50); color: var(--neutral-600); border: 1px solid var(--neutral-200); }
        
        @media (max-width: 768px) {
            .maps-main-container { padding: 1rem; padding-bottom: 6rem; }
            .map-wrapper-premium { border-radius: 2rem; border-width: 4px; }
            .map-filter-overlay { top: 1rem; left: 1rem; right: 1rem; gap: 0.5rem; }
            .map-filter-card { padding: 0.5rem 0.8rem; }
            .map-price-input { width: 70px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="glass-nav">
        <a href="/" data-navigate="/" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
            <img src="/kku_dorm_elite_logo_1777569958199.png" style="width:36px;height:36px;object-fit:contain">
            <span style="font-family:'Public Sans',sans-serif;font-weight:900;font-size:20px;letter-spacing:-0.05em;font-style:italic">Elite<span style="color:var(--brand-500)">Dorm</span></span>
        </a>
        <div class="nav-links">
            <a href="/" data-navigate="/" data-page="home" class="nav-link">Dashboard</a>
            <a href="/explorer" data-navigate="/explorer" data-page="explorer" class="nav-link">Explorer</a>
            <a href="/maps" data-navigate="/maps" data-page="maps" class="nav-link active">Maps</a>
            <a href="/compare" data-navigate="/compare" data-page="compare" class="nav-link">Comparison</a>
        </div>
        <button onclick="openDormModal()" class="btn-primary"><i class="fas fa-plus"></i> Register</button>
    </nav>

    <!-- Main Map Container -->
    <main class="maps-main-container reveal-up">
        <div class="map-wrapper-premium">
            <div class="map-filter-overlay">
                <div class="map-filter-row">
                    <div class="map-filter-card">
                        <i class="fas fa-search" style="color:var(--brand-500)"></i>
                        <input type="text" id="mapSearchInput" placeholder="ค้นหาชื่อหอพัก...">
                    </div>
                    <div class="map-filter-card">
                        <input type="text" id="mapMinPrice" class="map-price-input" placeholder="ต่ำสุด" oninput="formatCurrencyInput(this)">
                        <span style="color:var(--neutral-200)">-</span>
                        <input type="text" id="mapMaxPrice" class="map-price-input" placeholder="สูงสุด" oninput="formatCurrencyInput(this)">
                    </div>
                    <div id="mapFavFilter" class="map-fav-btn" title="แสดงเฉพาะที่ถูกใจ">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div id="mapModeToggle" class="map-fav-btn" title="สลับโหมดแผนที่">
                        <i class="fas fa-layer-group"></i>
                    </div>
                </div>
                
                <div class="map-zone-bar" id="mapZoneFilter">
                    <button class="zone-btn active" data-zone="ทั้งหมด">ทั้งหมด</button>
                    <button class="zone-btn" data-zone="กังสดาล">กังสดาล</button>
                    <button class="zone-btn" data-zone="โคลัมโบ">โคลัมโบ</button>
                    <button class="zone-btn" data-zone="หลังมอ">หลังมอ</button>
                    <button class="zone-btn" data-zone="อื่นๆ">อื่นๆ</button>
                </div>
            </div>
            <div id="fullMap"></div>
        </div>
    </main>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <a href="/" data-navigate="/"><i class="fas fa-house"></i></a>
        <a href="/explorer" data-navigate="/explorer"><i class="fas fa-compass"></i></a>
        <a href="#" onclick="openDormModal();return false" class="fab"><i class="fas fa-plus"></i></a>
        <a href="/maps" data-navigate="/maps" class="active"><i class="fas fa-map-location-dot"></i></a>
        <a href="/compare" data-navigate="/compare"><i class="fas fa-chart-simple"></i></a>
    </nav>

    <script src="/js/shared.js"></script>
    <script src="/js/maps.js"></script>
</body>
</html>

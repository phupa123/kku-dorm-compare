<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EliteDorm | Comparison Sheet</title>
    <link rel="icon" type="image/png" href="/kku_dorm_elite_logo_1777569958199.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Public+Sans:wght@800;900&family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body style="overflow-y:auto">

    <!-- Navigation -->
    <nav class="glass-nav">
        <a href="/" data-navigate="/" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
            <img src="/kku_dorm_elite_logo_1777569958199.png" style="width:36px;height:36px;object-fit:contain">
            <span style="font-family:'Public Sans',sans-serif;font-weight:900;font-size:20px;letter-spacing:-0.05em;font-style:italic">Elite<span style="color:var(--brand-500)">Dorm</span></span>
        </a>
        <div class="nav-links">
            <a href="/" data-navigate="/" data-page="home" class="nav-link">Dashboard</a>
            <a href="/explorer" data-navigate="/explorer" data-page="explorer" class="nav-link">Explorer</a>
            <a href="/maps" data-navigate="/maps" data-page="maps" class="nav-link">Maps</a>
            <a href="/compare" data-navigate="/compare" data-page="compare" class="nav-link">Comparison</a>
        </div>
        <button onclick="openDormModal()" class="btn-primary"><i class="fas fa-plus"></i> Register</button>
    </nav>

    <!-- Header -->
    <section style="padding:8rem 3rem 3rem;position:relative;overflow:hidden">
        <div class="deco-grid" style="mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,black,transparent)"></div>
        <div class="deco-orb amber" style="width:400px;height:400px;top:-80px;left:-100px"></div>
        <div class="deco-orb red" style="width:300px;height:300px;bottom:-50px;right:-80px"></div>
        <div style="max-width:80rem;margin:0 auto;position:relative;z-index:1" class="reveal-up">
            <span class="deco-badge" style="margin-bottom:1.5rem"><i class="fas fa-scale-balanced" style="color:var(--brand-500)"></i> Side-by-Side Analysis</span>
            <h1 style="font-family:'Public Sans',sans-serif;font-weight:900;font-size:3.5rem;letter-spacing:-0.05em;margin-bottom:1rem">Comparison <span class="deco-gradient-text">Matrix</span></h1>
            <p style="color:var(--neutral-400);font-size:1.1rem;max-width:36rem">เปรียบเทียบหอพักทุกมิติ ราคา ระยะทาง สิ่งอำนวยความสะดวก ในตารางเดียว</p>
        </div>
    </section>

    <!-- Table -->
    <section style="padding:0 3rem 6rem">
        <div style="max-width:80rem;margin:0 auto" class="reveal-up" style="transition-delay:0.2s">
            <div class="v-card" style="overflow:hidden">
                <div style="overflow-x:auto" class="custom-scrollbar">
                    <table class="comparison-table" style="min-width:1100px">
                        <thead>
                            <tr>
                                <th style="text-align:left;padding-left:2.5rem;width:300px">Dormitory</th>
                                <th style="width:150px">Rate (฿)</th>
                                <th style="width:120px">Distance</th>
                                <th style="width:100px">Travel</th>
                                <th style="width:200px">Facilities</th>
                                <th style="width:150px">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sheetBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer style="padding:3rem;text-align:center;border-top:1px solid var(--neutral-100)">
        <p style="font-size:11px;font-weight:700;color:var(--neutral-300)">EliteDorm &copy; 2026 &mdash; KKU Planning Pro</p>
    </footer>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <a href="/" data-navigate="/"><i class="fas fa-house"></i></a>
        <a href="/explorer" data-navigate="/explorer"><i class="fas fa-compass"></i></a>
        <a href="#" onclick="openDormModal();return false" class="fab"><i class="fas fa-plus"></i></a>
        <a href="/maps" data-navigate="/maps"><i class="fas fa-map-location-dot"></i></a>
        <a href="/compare" data-navigate="/compare" class="active"><i class="fas fa-chart-simple"></i></a>
    </nav>

    <!-- Modal (simplified for compare page) -->
    <div id="dormModal" class="modal-overlay">
        <div class="modal-body custom-scrollbar">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem">
                <h2 style="font-family:'Public Sans',sans-serif;font-size:2.5rem;font-weight:900;letter-spacing:-0.05em">Elite <span style="color:var(--brand-500)">Form</span></h2>
                <button onclick="closeDormModal()" style="width:48px;height:48px;border-radius:50%;border:none;background:var(--neutral-100);cursor:pointer;font-size:18px"><i class="fas fa-times"></i></button>
            </div>
            <form id="dormForm" style="display:flex;flex-direction:column;gap:2rem">
                <input type="hidden" id="dormId">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem"><div><label style="font-size:9px;font-weight:900;text-transform:uppercase;color:var(--neutral-400);margin-left:12px">Name</label><input type="text" id="dormName" required class="form-input"></div><div><label style="font-size:9px;font-weight:900;text-transform:uppercase;color:var(--neutral-400);margin-left:12px">Zone</label><select id="dormZone" class="form-input" style="appearance:none"><option value="หลังมอ">หลังมอ</option><option value="กังสดาล">กังสดาล</option><option value="ในมอ">ในมอ</option></select></div></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem"><div><label style="font-size:9px;font-weight:900;text-transform:uppercase;color:var(--neutral-400);margin-left:12px">Price</label><input type="number" id="dormPrice" min="0" inputmode="numeric" required class="form-input"></div><div><label style="font-size:9px;font-weight:900;text-transform:uppercase;color:var(--neutral-400);margin-left:12px">Coords</label><input type="text" id="dormCoords" required class="form-input"></div></div>
                <div><label style="font-size:9px;font-weight:900;text-transform:uppercase;color:var(--neutral-400);margin-left:12px;display:block;margin-bottom:1rem">Facilities</label><div id="facilityCheckboxes" style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem"><label style="padding:1.25rem;background:var(--neutral-50);border-radius:1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;cursor:pointer"><input type="checkbox" value="แอร์" style="accent-color:var(--brand-500)"><span style="font-size:10px;font-weight:900">แอร์</span></label><label style="padding:1.25rem;background:var(--neutral-50);border-radius:1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;cursor:pointer"><input type="checkbox" value="พัดลม" style="accent-color:var(--brand-500)"><span style="font-size:10px;font-weight:900">พัดลม</span></label><label style="padding:1.25rem;background:var(--neutral-50);border-radius:1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;cursor:pointer"><input type="checkbox" value="น้ำอุ่น" style="accent-color:var(--brand-500)"><span style="font-size:10px;font-weight:900">น้ำอุ่น</span></label><label style="padding:1.25rem;background:var(--neutral-50);border-radius:1.5rem;display:flex;flex-direction:column;align-items:center;gap:0.5rem;cursor:pointer"><input type="checkbox" value="Wi-Fi" style="accent-color:var(--brand-500)"><span style="font-size:10px;font-weight:900">Wi-Fi</span></label></div></div>
                <div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem"><label style="font-size:9px;font-weight:900;text-transform:uppercase;color:var(--neutral-400);margin-left:12px">Room Types</label><button type="button" onclick="addRoomTypeRow()" style="font-size:10px;font-weight:900;color:var(--brand-500);background:none;border:none;cursor:pointer">+ Add</button></div><div id="roomTypesList" style="display:flex;flex-direction:column;gap:0.5rem"></div></div>
                <div style="padding:3rem;border:3px dashed var(--neutral-200);border-radius:2.5rem;text-align:center;position:relative"><i class="fas fa-cloud-arrow-up" style="font-size:2rem;color:var(--neutral-300)"></i><input type="file" id="imageUpload" multiple style="position:absolute;inset:0;opacity:0;cursor:pointer"></div>
                <div id="imagePreview" style="display:flex;gap:0.75rem;overflow-x:auto"></div>
                <textarea id="dormDesc" rows="3" placeholder="Description..." class="form-input" style="border-radius:2rem"></textarea>
                <div style="display:flex;gap:1.5rem"><button type="button" onclick="closeDormModal()" style="flex:1;background:none;border:none;font-weight:900;color:var(--neutral-300);cursor:pointer">Cancel</button><button type="submit" class="btn-primary" style="flex:3;padding:1.5rem;justify-content:center">Save</button></div>
            </form>
        </div>
    </div>
    <div id="imagePreviewOverlay" class="image-preview-overlay" onclick="closeFullImage()"><img id="fullPreviewImage" style="max-width:100%;max-height:100%;border-radius:2rem"></div>

    <script src="/js/shared.js"></script>
    <script src="/js/compare.js"></script>
</body>
</html>
